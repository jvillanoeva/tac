<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colectivo — Ticketing & Access Control</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    .landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .landing-brand {
      font-size: 14px;
      letter-spacing: 6px;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .landing-tagline {
      font-size: 1.25rem;
      color: var(--text-secondary);
      margin-bottom: 48px;
      max-width: 400px;
    }
    .landing-actions {
      display: flex;
      gap: 12px;
    }
    .landing-footer {
      position: fixed;
      bottom: 24px;
      color: var(--text-muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="landing">
    <h1 class="landing-brand">Colectivo</h1>
    <p class="landing-tagline">Ticketing & access control para promotores independientes</p>
    <div class="landing-actions">
      <a href="/login.html" class="btn btn-primary">Entrar</a>
    </div>
    <div class="landing-footer">colectivo.live</div>
  </div>
</body>
</html>
