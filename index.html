<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Colectivo</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/auth.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; min-height: 100%;
      background: #fafaf8;
      font-family: 'EB Garamond', Georgia, serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      cursor: default;
      user-select: none;
    }

    #stage {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding-top: 12vh;
      padding-left: 8vw;
      padding-right: 8vw;
    }

    #quote-block {
      max-width: 62ch;
      line-height: 1.55;
      letter-spacing: 0.01em;
    }

    .word {
      display: inline;
      font-style: italic;
      font-size: clamp(1.6rem, 3vw, 2.8rem);
      color: #111111;
      opacity: 0;
      transition: opacity 400ms ease;
    }
    /* space between words */
    .word::after { content: ' '; }
    .word.visible { opacity: 1; }

    #author-block {
      margin-top: 2.2rem;
      font-style: normal;
      font-size: clamp(0.9rem, 1.4vw, 1.2rem);
      color: #555555;
      letter-spacing: 0.08em;
      line-height: 1.4;
      opacity: 0;
      transition: opacity 600ms ease;
    }
    #author-block.visible { opacity: 1; }

    #prompt-block {
      position: fixed;
      bottom: 8vh;
      left: 8vw;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.75rem;
      color: #999999;
      letter-spacing: 0.04em;
      opacity: 0;
      transition: opacity 500ms ease;
    }
    #prompt-block.visible { opacity: 1; }

    #cursor {
      display: inline-block;
      opacity: 1;
      transition: opacity 80ms ease;
    }
    #cursor.hidden { opacity: 0; }

    /* Mobile overrides */
    @media (max-width: 600px) {
      #stage {
        padding-top: 10vh;
        padding-left: 6vw;
        padding-right: 6vw;
      }
      .word {
        font-size: clamp(1.4rem, 5vw, 2rem);
      }
      #prompt-block {
        left: 50%;
        transform: translateX(-50%);
        white-space: nowrap;
      }
    }
  </style>
</head>
<body>

  <div id="stage">
    <div id="quote-block"></div>
    <div id="author-block"></div>
  </div>

  <div id="prompt-block">login (y/n)&nbsp;<span id="cursor">_</span></div>

  <script>
  // ── Auth init ──────────────────────────────────────────────────────────────
  Auth.init(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

  // ── Quote pool ─────────────────────────────────────────────────────────────
  const quotes = [
    {
      text: "The economy should be a servant to culture.",
      author: "Soichiro Fukutake"
    },
    {
      text: "Scenius stands for the intelligence and the intuition of a whole cultural scene. It is the communal form of the concept of the genius.",
      author: "Brian Eno"
    },
    {
      text: "The very idea of an exhibition is that we live in a world with each other, in which it is possible to make arrangements, associations, connections and wordless gestures, and, through this mise en scène, to speak.",
      author: "Hans Ulrich Obrist"
    },
    {
      text: "The required collective subject does not exist yet — and yet the crisis demands that it be constructed.",
      author: "Mark Fisher"
    },
    {
      text: "It is about making commitments, tying oneself down, and giving oneself away.",
      author: "David Brooks"
    }
  ];

  // ── State machine ──────────────────────────────────────────────────────────
  const STATE = {
    SILENCE:  'silence',
    WORDS:    'words',
    AUTHOR:   'author',
    PROMPT:   'prompt',
    WAITING:  'waiting',
    EXITING:  'exiting',
  };

  let state        = STATE.SILENCE;
  let quoteIndex   = 0;
  let wordIndex    = 0;
  let wordSpans    = [];
  let wordTimer    = null;
  let stateTimer   = null;
  let inactiveTimer = null;
  let redirecting  = false;
  let cursorInterval = null;
  let touchStartX  = 0;

  const quoteBlock  = document.getElementById('quote-block');
  const authorBlock = document.getElementById('author-block');
  const promptBlock = document.getElementById('prompt-block');
  const cursorEl    = document.getElementById('cursor');

  // ── Helpers ────────────────────────────────────────────────────────────────
  function clearTimers() {
    clearTimeout(wordTimer);
    clearTimeout(stateTimer);
    clearTimeout(inactiveTimer);
    clearInterval(cursorInterval);
    wordTimer = stateTimer = inactiveTimer = cursorInterval = null;
  }

  function setState(s) {
    state = s;
  }

  // ── Start a quote ──────────────────────────────────────────────────────────
  function startQuote(index) {
    clearTimers();
    quoteIndex = ((index % quotes.length) + quotes.length) % quotes.length;
    wordIndex  = 0;

    // Clear DOM
    quoteBlock.innerHTML  = '';
    authorBlock.classList.remove('visible');
    authorBlock.textContent = '';
    promptBlock.classList.remove('visible');
    cursorEl.classList.remove('hidden');

    setState(STATE.SILENCE);

    // Phase 1: silence
    stateTimer = setTimeout(() => {
      buildWords();
    }, 400);
  }

  function buildWords() {
    setState(STATE.WORDS);
    const q = quotes[quoteIndex];
    const words = q.text.split(' ');
    wordSpans = [];

    // Build all spans invisible
    words.forEach((w, i) => {
      const span = document.createElement('span');
      span.className = 'word';
      span.textContent = w;
      quoteBlock.appendChild(span);
      wordSpans.push(span);
    });

    // Materialize word by word
    showNextWord();
  }

  function showNextWord() {
    if (wordIndex >= wordSpans.length) {
      // All words shown — wait for last transition to settle then show author
      stateTimer = setTimeout(showAuthor, 800);
      return;
    }
    wordSpans[wordIndex].classList.add('visible');
    wordIndex++;
    wordTimer = setTimeout(showNextWord, 160);
  }

  function showAuthor() {
    setState(STATE.AUTHOR);
    const q = quotes[quoteIndex];
    authorBlock.textContent = '— ' + q.author;
    authorBlock.classList.add('visible');
    stateTimer = setTimeout(showPrompt, 600);
  }

  function showPrompt() {
    setState(STATE.PROMPT);
    promptBlock.classList.add('visible');

    // Cursor starts blinking after 1.5s
    stateTimer = setTimeout(() => {
      setState(STATE.WAITING);
      startCursorBlink();
      startInactiveTimer();
    }, 1500);
  }

  function startCursorBlink() {
    cursorInterval = setInterval(() => {
      cursorEl.classList.toggle('hidden');
    }, 800);
  }

  function startInactiveTimer() {
    inactiveTimer = setTimeout(() => {
      if (state === STATE.WAITING) nextQuote();
    }, 18000);
  }

  // ── Next quote ─────────────────────────────────────────────────────────────
  function nextQuote() {
    if (state === STATE.EXITING) return;
    setState(STATE.EXITING);
    clearTimers();

    // Fade out quote + author together
    quoteBlock.style.transition  = 'opacity 500ms ease';
    authorBlock.style.transition = 'opacity 500ms ease';
    promptBlock.style.transition = 'opacity 300ms ease';
    quoteBlock.style.opacity     = '0';
    authorBlock.style.opacity    = '0';
    promptBlock.style.opacity    = '0';

    setTimeout(() => {
      // Reset inline styles
      quoteBlock.style.transition  = '';
      quoteBlock.style.opacity     = '';
      authorBlock.style.transition = '';
      authorBlock.style.opacity    = '';
      promptBlock.style.transition = '';
      promptBlock.style.opacity    = '';
      startQuote(quoteIndex + 1);
    }, 520);
  }

  // ── Enter ──────────────────────────────────────────────────────────────────
  async function handleEnter() {
    if (redirecting) return;
    redirecting = true;
    clearTimers();

    try {
      const session = await Auth.getSession();
      window.location.href = session ? '/dashboard.html' : '/login.html';
    } catch (e) {
      window.location.href = '/login.html';
    }
  }

  // ── Keyboard ───────────────────────────────────────────────────────────────
  document.addEventListener('keydown', (e) => {
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    if (state !== STATE.WAITING) return;
    if (e.key === 'y' || e.key === 'Y' || e.key === 'Enter') handleEnter();
    if (e.key === 'n' || e.key === 'N') nextQuote();
  });

  // ── Click ──────────────────────────────────────────────────────────────────
  document.addEventListener('click', () => {
    if (state === STATE.WAITING) handleEnter();
  });

  // ── Touch swipe left = N ───────────────────────────────────────────────────
  document.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 60) {
      // Swipe — treat as N (next)
      if (state === STATE.WAITING) nextQuote();
    } else {
      // Tap — treat as Y (enter)
      if (state === STATE.WAITING) handleEnter();
    }
  }, { passive: true });

  // ── Boot ───────────────────────────────────────────────────────────────────
  // Wait for font to load before starting
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(() => startQuote(0));
  } else {
    window.addEventListener('load', () => startQuote(0));
  }
  </script>
</body>
</html>
