<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAC — Colectivo</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/auth.js"></script>
  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'IBM Plex Mono', 'SF Mono', 'Courier New', monospace;
    }
    .loader {
      text-align: center;
      color: #333;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="loader">TAC.COLECTIVO</div>
  <script>
    (async () => {
      try {
        Auth.init(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        const session = await Auth.getSession();
        window.location.href = session ? '/dashboard.html' : '/login.html';
      } catch (e) {
        window.location.href = '/login.html';
      }
    })();
  </script>
</body>
</html>
