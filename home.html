<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Colectivo</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/auth.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #fafaf8;
      font-family: 'EB Garamond', Georgia, serif;
      -webkit-font-smoothing: antialiased;
      cursor: default;
      user-select: none;
    }

    #stage {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 8vw;
    }

    #headline {
      font-style: italic;
      font-size: clamp(1.6rem, 3vw, 2.8rem);
      color: #111111;
      line-height: 1.55;
      letter-spacing: 0.01em;
      opacity: 0;
      animation: fadein 800ms ease 300ms forwards;
    }

    #sub {
      margin-top: 1.6rem;
      font-style: normal;
      font-size: clamp(0.9rem, 1.4vw, 1.2rem);
      color: #555555;
      letter-spacing: 0.08em;
      line-height: 1.4;
      opacity: 0;
      animation: fadein 800ms ease 900ms forwards;
    }

    @keyframes fadein {
      to { opacity: 1; }
    }

    @media (max-width: 600px) {
      #headline { font-size: clamp(1.4rem, 5vw, 2rem); }
    }
  </style>
</head>
<body>

  <div id="stage">
    <div id="headline">Work in progress.</div>
    <div id="sub">Something is being built here.</div>
  </div>

  <script>
    Auth.init(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
    Auth.requireSession().catch(() => {});
  </script>
</body>
</html>
