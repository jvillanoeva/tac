<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Colectivo</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/auth.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #fafaf8;
      -webkit-font-smoothing: antialiased;
      cursor: default;
      user-select: none;
    }

    #site-title {
      position: fixed;
      top: 6vh;
      left: 6vw;
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(0.85rem, 1.2vw, 1rem);
      letter-spacing: 0.14em;
      color: #111111;
      text-transform: uppercase;
    }

    #menu {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-left: 8vw;
      gap: 3.5vh;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      text-decoration: none;
      opacity: 0;
      animation: fadein 600ms ease forwards;
    }

    .menu-item:nth-child(1) { animation-delay: 200ms; }
    .menu-item:nth-child(2) { animation-delay: 380ms; }

    .menu-item span.label {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(3rem, 7vw, 6.5rem);
      font-weight: 400;
      color: #111111;
      line-height: 1;
      letter-spacing: -0.01em;
      transition: opacity 200ms ease;
    }

    .menu-item:hover span.label { opacity: 0.45; }

    .menu-item .icon {
      font-size: clamp(1.2rem, 2.5vw, 2rem);
      line-height: 1;
      display: inline-block;
    }

    /* 💸 flies in from off-screen right with a tumble */
    #icon-admin {
      opacity: 0;
      animation: fly-in 700ms cubic-bezier(0.22, 1.8, 0.55, 0.95) 900ms forwards;
    }

    @keyframes fly-in {
      0%   { opacity: 0; transform: translateX(120px) rotate(180deg) scale(0.4); }
      60%  { opacity: 1; }
      100% { opacity: 1; transform: translateX(0)    rotate(-12deg)  scale(1); }
    }

    #icon-project {
      opacity: 0;
      animation: fadein 400ms ease 420ms forwards;
    }

    @keyframes fadein {
      to { opacity: 1; }
    }

    @media (max-width: 600px) {
      #menu { padding-left: 6vw; gap: 4vh; }
      .menu-item span.label { font-size: clamp(3rem, 14vw, 5rem); }
    }
  </style>
</head>
<body>

  <div id="site-title">Colectivo</div>

  <nav id="menu">
    <a class="menu-item" href="/dashboard.html">
      <span class="icon" id="icon-admin">💸</span>
      <span class="label">Admin</span>
    </a>
    <a class="menu-item" href="#">
      <span class="icon" id="icon-project">📋</span>
      <span class="label">Project</span>
    </a>
  </nav>

  <script>
    Auth.init(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
    Auth.requireSession().catch(() => {});
  </script>
</body>
</html>
