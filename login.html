<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Colectivo</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
    }
    .login-brand {
      text-align: center;
      margin-bottom: 40px;
    }
    .login-brand h1 {
      font-family: var(--font-display);
      font-size: 12px;
      letter-spacing: 8px;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--accent);
    }
    .login-brand p {
      color: var(--text-muted);
      font-size: 10px;
      margin-top: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .login-card {
      border: 1px solid var(--border);
      padding: 40px;
      background: var(--bg-card);
    }
    .login-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 32px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .login-tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: var(--text-muted);
      border: none;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all var(--transition);
    }
    .login-tab.active {
      background: var(--accent-dim);
      color: var(--accent);
    }
    .login-footer {
      text-align: center;
      margin-top: 24px;
    }
    .login-footer a {
      color: var(--text-secondary);
      font-size: 13px;
      text-decoration: none;
    }
    .login-footer a:hover { color: var(--text); }
    .alert {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      margin-bottom: 16px;
    }
    .alert-error { background: var(--accent-dim); color: var(--danger); border: none; border-left: 3px solid var(--accent); }
    .alert-success { background: var(--green-dim); color: var(--success); border: none; border-left: 3px solid var(--green); }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-brand">
        <h1>Colectivo</h1>
        <p>Ticketing & Access Control</p>
      </div>

      <div class="login-tabs">
        <button class="login-tab active" onclick="showTab('signin')">Iniciar sesión</button>
        <button class="login-tab" onclick="showTab('signup')">Crear cuenta</button>
      </div>

      <div id="alert" class="hidden"></div>

      <!-- Sign In Form -->
      <form id="signin-form" onsubmit="handleSignIn(event)">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="signin-email" required placeholder="tu@email.com">
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <input type="password" class="form-input" id="signin-password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%" id="signin-btn">
          Entrar
        </button>
      </form>

      <!-- Sign Up Form -->
      <form id="signup-form" class="hidden" onsubmit="handleSignUp(event)">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="signup-email" required placeholder="tu@email.com">
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <input type="password" class="form-input" id="signup-password" required minlength="6" placeholder="Mínimo 6 caracteres">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%" id="signup-btn">
          Crear cuenta
        </button>
      </form>

      <div class="login-footer">
        <a href="#" onclick="handleForgotPassword(event)">¿Olvidaste tu contraseña?</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script>
    Auth.init(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
    Auth.redirectIfLoggedIn();

    function showTab(tab) {
      document.querySelectorAll('.login-tab').forEach((t, i) => {
        t.classList.toggle('active', (tab === 'signin' && i === 0) || (tab === 'signup' && i === 1));
      });
      document.getElementById('signin-form').classList.toggle('hidden', tab !== 'signin');
      document.getElementById('signup-form').classList.toggle('hidden', tab !== 'signup');
      hideAlert();
    }

    function showAlert(msg, type = 'error') {
      const el = document.getElementById('alert');
      el.className = `alert alert-${type}`;
      el.textContent = msg;
    }

    function hideAlert() {
      document.getElementById('alert').className = 'hidden';
    }

    async function handleSignIn(e) {
      e.preventDefault();
      const btn = document.getElementById('signin-btn');
      btn.disabled = true;
      btn.textContent = 'Entrando...';
      hideAlert();

      try {
        await Auth.signIn(
          document.getElementById('signin-email').value,
          document.getElementById('signin-password').value
        );
        window.location.href = '/dashboard.html';
      } catch (err) {
        showAlert(err.message === 'Invalid login credentials'
          ? 'Email o contraseña incorrectos'
          : err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    }

    async function handleSignUp(e) {
      e.preventDefault();
      const btn = document.getElementById('signup-btn');
      btn.disabled = true;
      btn.textContent = 'Creando...';
      hideAlert();

      try {
        await Auth.signUp(
          document.getElementById('signup-email').value,
          document.getElementById('signup-password').value
        );
        showAlert('Cuenta creada. Revisa tu email para confirmar.', 'success');
      } catch (err) {
        showAlert(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Crear cuenta';
      }
    }

    async function handleForgotPassword(e) {
      e.preventDefault();
      const email = document.getElementById('signin-email').value;
      if (!email) {
        showAlert('Escribe tu email primero');
        return;
      }
      try {
        await Auth.resetPassword(email);
        showAlert('Te enviamos un link para restablecer tu contraseña', 'success');
      } catch (err) {
        showAlert(err.message);
      }
    }
  </script>
</body>
</html>
