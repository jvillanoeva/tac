<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evento — Colectivo</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    .event-hero {
      position: relative;
      width: 100%;
      aspect-ratio: 16/7;
      max-height: 400px;
      overflow: hidden;
      background: var(--bg-input);
    }
    .event-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .event-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(transparent 30%, rgba(0,0,0,0.85));
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 32px;
    }
    .event-hero-overlay h1 {
      font-size: 2rem;
      margin-bottom: 4px;
    }
    .event-hero-overlay .subtitle {
      color: rgba(255,255,255,0.7);
      font-size: 1rem;
    }
    .event-content {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    .event-details {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .event-detail {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--text-secondary);
    }
    .event-section {
      margin-bottom: 32px;
    }
    .event-section h2 {
      margin-bottom: 12px;
      font-size: 1rem;
    }
    .event-section p {
      color: var(--text-secondary);
      line-height: 1.7;
      white-space: pre-wrap;
    }
    .dos-donts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .guestlist-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      color: var(--text-secondary);
    }
    @media (max-width: 640px) {
      .dos-donts { grid-template-columns: 1fr; }
      .event-hero-overlay h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-brand">Colectivo</a>
  </nav>

  <div id="event-page">
    <div class="empty-state" style="padding:80px 24px;">
      <div class="spinner" style="margin:0 auto"></div>
    </div>
  </div>

  <script src="/assets/js/config.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const eventSlug = params.get('e');

    if (!eventSlug) {
      window.location.href = '/';
    }

    async function loadEvent() {
      try {
        const res = await fetch(`${CONFIG.API_URL}/api/events/${eventSlug}/public`);
        if (!res.ok) throw new Error('Evento no encontrado');
        const event = await res.json();

        document.title = `${event.name} — Colectivo`;

        const page = document.getElementById('event-page');
        page.innerHTML = `
          ${event.banner_url ? `
            <div class="event-hero">
              <img src="${event.banner_url}" alt="${event.name}">
              <div class="event-hero-overlay">
                <h1>${event.name}</h1>
                ${event.subtitle ? `<div class="subtitle">${event.subtitle}</div>` : ''}
              </div>
            </div>
          ` : ''}

          <div class="event-content">
            ${!event.banner_url ? `<h1 style="margin-bottom:8px">${event.name}</h1>
              ${event.subtitle ? `<p class="text-secondary" style="margin-bottom:24px">${event.subtitle}</p>` : ''}` : ''}

            <div class="event-details">
              ${event.date_label ? `<div class="event-detail">📅 ${event.date_label}</div>` : ''}
              ${event.time_label ? `<div class="event-detail">🕐 ${event.time_label}</div>` : ''}
              ${event.venue ? `<div class="event-detail">📍 ${event.venue}${event.city ? ', ' + event.city : ''}</div>` : ''}
            </div>

            <div class="guestlist-badge mb-16">
              🎟️ Acceso por guestlist
            </div>

            ${event.description ? `
              <div class="event-section">
                <h2>Acerca del evento</h2>
                <p>${event.description}</p>
              </div>
            ` : ''}

            ${event.dos || event.donts ? `
              <div class="event-section">
                <div class="dos-donts">
                  ${event.dos ? `<div class="card"><h3 style="color:var(--success);margin-bottom:8px">✓ Do's</h3><p class="text-sm">${event.dos}</p></div>` : ''}
                  ${event.donts ? `<div class="card"><h3 style="color:var(--danger);margin-bottom:8px">✕ Don'ts</h3><p class="text-sm">${event.donts}</p></div>` : ''}
                </div>
              </div>
            ` : ''}

            ${event.restrictions ? `
              <div class="event-section">
                <div class="card" style="border-color:var(--warning);background:rgba(234,179,8,0.05)">
                  <h3 style="color:var(--warning);margin-bottom:8px">⚠ Restricciones</h3>
                  <p class="text-sm">${event.restrictions}</p>
                </div>
              </div>
            ` : ''}

            ${event.contact_email || event.contact_phone || event.contact_instagram ? `
              <div class="event-section">
                <h2>Contacto</h2>
                <div style="display:flex;gap:16px;flex-wrap:wrap;">
                  ${event.contact_email ? `<span class="text-sm text-secondary">📧 ${event.contact_email}</span>` : ''}
                  ${event.contact_phone ? `<span class="text-sm text-secondary">📱 ${event.contact_phone}</span>` : ''}
                  ${event.contact_instagram ? `<span class="text-sm text-secondary">📸 ${event.contact_instagram}</span>` : ''}
                </div>
              </div>
            ` : ''}

            ${event.map_url ? `
              <div class="event-section">
                <h2>Ubicación</h2>
                ${event.address ? `<p class="text-secondary text-sm mb-8">${event.address}</p>` : ''}
                <a href="${event.map_url}" target="_blank" class="btn btn-sm">Ver en mapa →</a>
              </div>
            ` : ''}
          </div>
        `;
      } catch (err) {
        document.getElementById('event-page').innerHTML = `
          <div class="empty-state" style="padding:80px 24px;">
            <h3>Evento no encontrado</h3>
            <p class="text-secondary">Este evento no existe o no está publicado</p>
            <a href="/" class="btn mt-24">Ir al inicio</a>
          </div>`;
      }
    }

    loadEvent();
  </script>
</body>
</html>
