<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Colectivo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    /* ── Match pnlm header ─────────────────────────────────────────── */
    .nav {
      height: 56px;
      padding: 0 32px;
      background: #111111;
      border-bottom: 1px solid #1f2937;
      border-top: none;
    }
    .nav-brand {
      font-family: 'Archivo Black', Arial, sans-serif;
      font-weight: 400;
      font-size: 15px;
      letter-spacing: 0.02em;
      color: #ffffff;
      text-transform: uppercase;
      text-decoration: none;
    }
    .nav-brand:hover { color: #ffffff; }
    .nav-links a, .nav-links a.active, .nav-links a:hover {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: #6b7280;
      text-transform: none;
      letter-spacing: 0;
    }
    .nav-links a:hover { color: #9ca3af; }
    .nav-links a.active { color: #9ca3af; }
    .nav-user {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: #4b5563;
    }

    /* ── Hero font ─────────────────────────────────────────────────── */
    /* Single rule: touch here to restyle all hero objects at once     */
    .hero {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 300;
      letter-spacing: 0;
    }

    /* ── Layout ────────────────────────────────────────────────────── */
    .event-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      border: 1px solid #1f2937;
      cursor: pointer;
      transition: border-color 120ms ease, background 120ms ease;
      text-decoration: none;
      color: inherit;
    }
    .event-card:hover {
      border-color: #374151;
      background: #1a1a1a;
    }
    .event-thumb {
      width: 64px;
      height: 64px;
      object-fit: cover;
      background: #1a1a1a;
      flex-shrink: 0;
    }
    .event-info { flex: 1; min-width: 0; }
    .event-name {
      font-size: 16px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #ffffff;
    }
    .event-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: #6b7280;
      margin-top: 4px;
    }
    .events-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .event-card { position: relative; }
    .event-menu-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: none;
      border: none;
      color: #4b5563;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      line-height: 1;
      z-index: 2;
      font-family: inherit;
    }
    .event-menu-btn:hover { color: #9ca3af; }
    .event-menu {
      display: none;
      position: absolute;
      top: 36px;
      right: 12px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      z-index: 10;
      min-width: 160px;
    }
    .event-menu.open { display: block; }
    .event-menu a, .event-menu button {
      display: block;
      width: 100%;
      padding: 10px 16px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: #9ca3af;
      text-decoration: none;
      border: none;
      background: none;
      text-align: left;
      cursor: pointer;
    }
    .event-menu a:hover, .event-menu button:hover {
      background: #222;
      color: #fff;
    }
    .event-menu button.danger { color: #ef4444; }
    .event-menu button.danger:hover { background: #1c1010; color: #f87171; }
    .section-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #4b5563;
      margin-bottom: 8px;
      margin-top: 32px;
    }
    .section-label:first-child { margin-top: 0; }
    .btn-primary.hero {
      background: none;
      border: 1px solid #374151;
      color: #ffffff;
      padding: 8px 16px;
      font-size: 14px;
      text-decoration: none;
      transition: border-color 120ms ease, color 120ms ease;
    }
    .btn-primary.hero:hover {
      border-color: #6b7280;
      color: #ffffff;
      background: none;
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div style="display:flex;align-items:center;gap:0">
      <a href="/dashboard.html" class="nav-brand">TAC.COLECTIVO</a>
      <span style="font-family:'IBM Plex Mono',monospace;color:#4b5563;margin:0 10px;font-size:13px">·</span>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:0.1em">Dashboard</span>
    </div>
    <div class="nav-links">
      <span class="nav-user" id="nav-email"></span>
      <a href="#" onclick="Auth.signOut()">salir</a>
    </div>
  </nav>

  <div class="container page">
    <div class="page-header">
      <h1 class="hero" style="font-size:28px;color:#ffffff">Mis eventos</h1>
      <div style="display:flex;gap:8px;">
        <a href="/org-editor.html" class="btn hero">+ Nueva organización</a>
        <a href="/event-editor.html" class="btn btn-primary hero">+ Nuevo evento</a>
      </div>
    </div>

    <!-- Organizations strip -->
    <div id="orgs-strip" style="display:none;margin-bottom:32px;">
      <div class="section-label" style="font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:400;text-transform:uppercase;letter-spacing:0.18em;color:#4b5563;margin-bottom:8px;">Organizaciones</div>
      <div id="orgs-list" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
    </div>

    <div id="events-container">
      <div class="empty-state">
        <div class="spinner" style="margin:0 auto"></div>
      </div>
    </div>
  </div>

  <style>
    .org-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid #1f2937;
      text-decoration: none;
      color: #e5e7eb;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.05em;
      transition: border-color 120ms, background 120ms;
    }
    .org-chip:hover { border-color: #374151; background: #1a1a1a; }
    .org-chip img { height: 18px; max-width: 60px; object-fit: contain; filter: invert(1); }
    .org-chip .type {
      color: #6b7280;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .org-section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      margin-top: 32px;
    }
    .org-section-header img { height: 20px; max-width: 80px; object-fit: contain; filter: invert(1); }
    .org-section-header .org-name {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #9ca3af;
    }
    .org-section-header a {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: #4b5563;
      text-decoration: none;
      letter-spacing: 0.1em;
      margin-left: auto;
    }
    .org-section-header a:hover { color: #9ca3af; }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script>
    Auth.init(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
    API.init(CONFIG.API_URL);

    async function loadDashboard() {
      const session = await Auth.requireSession();
      document.getElementById('nav-email').textContent = session.user.email;

      try {
        // Load orgs strip + events in parallel
        const [orgs, eventsResp] = await Promise.all([
          API.get('/api/orgs').catch(() => []),
          API.get('/api/events'),
        ]);
        const { owned = [], staffed = [], viaOrg = [] } = eventsResp;

        // Render orgs strip
        if (orgs.length > 0) {
          document.getElementById('orgs-strip').style.display = '';
          document.getElementById('orgs-list').innerHTML = orgs.map(o => `
            <a href="/org-editor.html?slug=${o.slug}" class="org-chip">
              ${o.logo_url ? `<img src="${o.logo_url}" alt="">` : ''}
              <span>${esc(o.name)}</span>
              <span class="type">${o.type}</span>
            </a>
          `).join('');
        }

        const container = document.getElementById('events-container');

        if (owned.length === 0 && staffed.length === 0 && viaOrg.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <h3>No tienes eventos aún</h3>
              <p class="text-secondary">Crea tu primer evento para empezar</p>
              <a href="/event-editor.html" class="btn btn-primary mt-24">+ Nuevo evento</a>
            </div>`;
          return;
        }

        // Combine my events from all sources, group by organization
        const allMyEvents = [...owned, ...viaOrg];
        const byOrg = new Map();   // org_id -> { org, events[] }
        const standalone = [];

        for (const ev of allMyEvents) {
          if (ev.organizations && ev.organization_id) {
            if (!byOrg.has(ev.organization_id)) {
              byOrg.set(ev.organization_id, { org: ev.organizations, events: [] });
            }
            byOrg.get(ev.organization_id).events.push(ev);
          } else {
            standalone.push(ev);
          }
        }

        let html = '';

        // Render each org group
        for (const { org, events } of byOrg.values()) {
          html += `
            <div class="org-section-header">
              ${org.logo_url ? `<img src="${esc(org.logo_url)}" alt="">` : ''}
              <span class="org-name">${esc(org.name)}</span>
              <a href="/${esc(org.slug)}" target="_blank">Ver pública →</a>
            </div>
            <div class="events-list">
              ${events.map(ev => renderEventCard(ev)).join('')}
            </div>
          `;
        }

        // Standalone events (no org)
        if (standalone.length > 0) {
          html += `
            <div class="section-label hero" style="font-size:11px;${byOrg.size > 0 ? 'margin-top:32px;' : ''}">Eventos independientes</div>
            <div class="events-list">
              ${standalone.map(ev => renderEventCard(ev)).join('')}
            </div>
          `;
        }

        // Staffed events
        if (staffed.length > 0) {
          html += '<div class="section-label" style="margin-top:32px;">Staff</div><div class="events-list">';
          for (const ev of staffed) {
            html += renderEventCard(ev, ev.staff_role);
          }
          html += '</div>';
        }

        container.innerHTML = html;
      } catch (err) {
        document.getElementById('events-container').innerHTML = `
          <div class="empty-state">
            <h3>Error al cargar eventos</h3>
            <p class="text-secondary">${err.message}</p>
          </div>`;
      }
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s == null ? '' : String(s);
      return d.innerHTML;
    }

    function renderEventCard(ev, staffRole) {
      const thumb = ev.banner_url
        ? `<img src="${ev.banner_url}" class="event-thumb" alt="">`
        : `<div class="event-thumb"></div>`;

      const badge = ev.published
        ? '<span class="badge badge-success">Publicado</span>'
        : '<span class="badge badge-muted">Borrador</span>';

      const roleLabel = staffRole
        ? `<span class="badge badge-warning" style="margin-left:8px">${staffRole}</span>`
        : '';

      const menu = !staffRole ? `
        <button class="event-menu-btn" onclick="event.preventDefault();event.stopPropagation();toggleMenu('${ev.slug}')">&#8942;</button>
        <div class="event-menu" id="menu-${ev.slug}">
          <a href="/event-editor.html?slug=${ev.slug}">Editar</a>
          <a href="/guestlist.html?slug=${ev.slug}">Guestlist</a>
          <a href="/scan.html?slug=${ev.slug}">Scanner</a>
          <button class="danger" onclick="event.preventDefault();deleteEvent('${ev.slug}', '${ev.name.replace(/'/g, "\\'")}')">Eliminar</button>
        </div>
      ` : '';

      return `
        <a href="/guestlist.html?slug=${ev.slug}" class="event-card">
          ${thumb}
          <div class="event-info">
            <div class="event-name hero">${ev.name}</div>
            <div class="event-meta">
              ${ev.date_label || ''}${ev.venue ? ' · ' + ev.venue : ''}
            </div>
            <div class="mt-8">${badge}${roleLabel}</div>
          </div>
          ${menu}
        </a>`;
    }

    function toggleMenu(slug) {
      // Close all other menus
      document.querySelectorAll('.event-menu.open').forEach(m => {
        if (m.id !== 'menu-' + slug) m.classList.remove('open');
      });
      document.getElementById('menu-' + slug).classList.toggle('open');
    }

    // Close menus on outside click
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.event-menu-btn') && !e.target.closest('.event-menu')) {
        document.querySelectorAll('.event-menu.open').forEach(m => m.classList.remove('open'));
      }
    });

    async function deleteEvent(slug, name) {
      if (!confirm(`¿Eliminar "${name}"? Esta acción no se puede deshacer.`)) return;
      try {
        await API.del(`/api/events/${slug}`);
        await loadDashboard();
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    loadDashboard();
  </script>
</body>
</html>
