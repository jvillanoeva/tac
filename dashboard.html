<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Colectivo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    /* ── Match pnlm header ─────────────────────────────────────────── */
    .nav {
      height: 56px;
      padding: 0 32px;
      background: #111111;
      border-bottom: 1px solid #1f2937;
      border-top: none;
    }
    .nav-brand {
      font-family: 'Archivo Black', Arial, sans-serif;
      font-weight: 400;
      font-size: 15px;
      letter-spacing: 0.02em;
      color: #ffffff;
      text-transform: uppercase;
      text-decoration: none;
    }
    .nav-brand:hover { color: #ffffff; }
    .nav-links a, .nav-links a.active, .nav-links a:hover {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: #6b7280;
      text-transform: none;
      letter-spacing: 0;
    }
    .nav-links a:hover { color: #9ca3af; }
    .nav-links a.active { color: #9ca3af; }
    .nav-user {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: #4b5563;
    }

    /* ── Hero font ─────────────────────────────────────────────────── */
    /* Single rule: touch here to restyle all hero objects at once     */
    .hero {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 300;
      letter-spacing: 0;
    }

    /* ── Layout ────────────────────────────────────────────────────── */
    .event-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      border: 1px solid #1f2937;
      cursor: pointer;
      transition: border-color 120ms ease, background 120ms ease;
      text-decoration: none;
      color: inherit;
    }
    .event-card:hover {
      border-color: #374151;
      background: #1a1a1a;
    }
    .event-thumb {
      width: 64px;
      height: 64px;
      object-fit: cover;
      background: #1a1a1a;
      flex-shrink: 0;
    }
    .event-info { flex: 1; min-width: 0; }
    .event-name {
      font-size: 16px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #ffffff;
    }
    .event-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: #6b7280;
      margin-top: 4px;
    }
    .events-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .section-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #4b5563;
      margin-bottom: 8px;
      margin-top: 32px;
    }
    .section-label:first-child { margin-top: 0; }
    .btn-primary.hero {
      background: none;
      border: 1px solid #374151;
      color: #ffffff;
      padding: 8px 16px;
      font-size: 14px;
      text-decoration: none;
      transition: border-color 120ms ease, color 120ms ease;
    }
    .btn-primary.hero:hover {
      border-color: #6b7280;
      color: #ffffff;
      background: none;
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div style="display:flex;align-items:center;gap:0">
      <a href="/dashboard.html" class="nav-brand">TAC.COLECTIVO</a>
      <span style="font-family:'IBM Plex Mono',monospace;color:#4b5563;margin:0 10px;font-size:13px">·</span>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:0.1em">Dashboard</span>
    </div>
    <div class="nav-links">
      <span class="nav-user" id="nav-email"></span>
      <a href="#" onclick="Auth.signOut()">salir</a>
    </div>
  </nav>

  <div class="container page">
    <div class="page-header">
      <h1 class="hero" style="font-size:28px;color:#ffffff">Mis eventos</h1>
      <a href="/event-editor.html" class="btn btn-primary hero">+ Nuevo evento</a>
    </div>

    <div id="events-container">
      <div class="empty-state">
        <div class="spinner" style="margin:0 auto"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script>
    Auth.init(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
    API.init(CONFIG.API_URL);

    async function loadDashboard() {
      const session = await Auth.requireSession();
      document.getElementById('nav-email').textContent = session.user.email;

      try {
        const { owned, staffed } = await API.get('/api/events');

        const container = document.getElementById('events-container');

        if (owned.length === 0 && staffed.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <h3>No tienes eventos aún</h3>
              <p class="text-secondary">Crea tu primer evento para empezar</p>
              <a href="/event-editor.html" class="btn btn-primary mt-24">+ Nuevo evento</a>
            </div>`;
          return;
        }

        let html = '';

        if (owned.length > 0) {
          html += '<div class="section-label hero" style="font-size:11px">Mis eventos</div><div class="events-list">';
          for (const ev of owned) {
            html += renderEventCard(ev);
          }
          html += '</div>';
        }

        if (staffed.length > 0) {
          html += '<div class="section-label">Staff</div><div class="events-list">';
          for (const ev of staffed) {
            html += renderEventCard(ev, ev.staff_role);
          }
          html += '</div>';
        }

        container.innerHTML = html;
      } catch (err) {
        document.getElementById('events-container').innerHTML = `
          <div class="empty-state">
            <h3>Error al cargar eventos</h3>
            <p class="text-secondary">${err.message}</p>
          </div>`;
      }
    }

    function renderEventCard(ev, staffRole) {
      const thumb = ev.banner_url
        ? `<img src="${ev.banner_url}" class="event-thumb" alt="">`
        : `<div class="event-thumb"></div>`;

      const badge = ev.published
        ? '<span class="badge badge-success">Publicado</span>'
        : '<span class="badge badge-muted">Borrador</span>';

      const roleLabel = staffRole
        ? `<span class="badge badge-warning" style="margin-left:8px">${staffRole}</span>`
        : '';

      return `
        <a href="/guestlist.html?slug=${ev.slug}" class="event-card">
          ${thumb}
          <div class="event-info">
            <div class="event-name hero">${ev.name}</div>
            <div class="event-meta">
              ${ev.date_label || ''}${ev.venue ? ' · ' + ev.venue : ''}
            </div>
            <div class="mt-8">${badge}${roleLabel}</div>
          </div>
        </a>`;
    }

    loadDashboard();
  </script>
</body>
</html>
