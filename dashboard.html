<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Colectivo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    /* ── Match pnlm header ─────────────────────────────────────────── */
    .nav {
      height: 56px;
      padding: 0 32px;
      background: #111111;
      border-bottom: 1px solid #1f2937;
      border-top: none;
    }
    .nav-brand {
      font-family: 'Archivo Black', Arial, sans-serif;
      font-weight: 400;
      font-size: 15px;
      letter-spacing: 0.02em;
      color: #ffffff;
      text-transform: uppercase;
      text-decoration: none;
    }
    .nav-brand:hover { color: #ffffff; }
    .nav-links a, .nav-links a.active, .nav-links a:hover {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: #6b7280;
      text-transform: none;
      letter-spacing: 0;
    }
    .nav-links a:hover { color: #9ca3af; }
    .nav-links a.active { color: #9ca3af; }
    .nav-user {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: #4b5563;
    }

    /* ── Hero font ─────────────────────────────────────────────────── */
    /* Single rule: touch here to restyle all hero objects at once     */
    .hero {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 300;
      letter-spacing: 0;
    }

    /* ── Layout ────────────────────────────────────────────────────── */
    .event-card {
      border: 1px solid #1f2937;
      transition: border-color 120ms ease, background 120ms ease;
      position: relative;
    }
    .event-card:hover {
      border-color: #374151;
      background: #1a1a1a;
    }
    .event-card-link {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      padding-right: 44px; /* leave room for kebab */
    }
    .event-thumb {
      width: 64px;
      height: 64px;
      object-fit: cover;
      background: #1a1a1a;
      flex-shrink: 0;
    }
    .event-info { flex: 1; min-width: 0; }
    .event-name {
      font-size: 16px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #ffffff;
    }
    .event-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: #6b7280;
      margin-top: 4px;
    }
    .events-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .event-menu-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: none;
      border: none;
      color: #4b5563;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      line-height: 1;
      z-index: 2;
      font-family: inherit;
      border-radius: 4px;
      transition: color 120ms, background 120ms;
    }
    .event-menu-btn:hover { color: #e5e7eb; background: rgba(255,255,255,0.04); }
    .event-menu {
      position: absolute;
      top: 40px;
      right: 12px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      z-index: 10;
      min-width: 160px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      opacity: 0;
      transform: translateY(-4px) scale(0.98);
      transform-origin: top right;
      pointer-events: none;
      transition: opacity 140ms ease, transform 140ms ease;
    }
    .event-menu.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }
    .event-menu a, .event-menu button {
      display: block;
      width: 100%;
      padding: 10px 16px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: #9ca3af;
      text-decoration: none;
      border: none;
      background: none;
      text-align: left;
      cursor: pointer;
    }
    .event-menu a:hover, .event-menu button:hover {
      background: #222;
      color: #fff;
    }
    .event-menu button.danger { color: #ef4444; }
    .event-menu button.danger:hover { background: #1c1010; color: #f87171; }
    .section-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #4b5563;
      margin-bottom: 8px;
      margin-top: 32px;
    }
    .section-label:first-child { margin-top: 0; }
    .btn-primary.hero {
      background: none;
      border: 1px solid #374151;
      color: #ffffff;
      padding: 8px 16px;
      font-size: 14px;
      text-decoration: none;
      transition: border-color 120ms ease, color 120ms ease;
    }
    .btn-primary.hero:hover {
      border-color: #6b7280;
      color: #ffffff;
      background: none;
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div style="display:flex;align-items:center;gap:0">
      <a href="/dashboard.html" class="nav-brand">TAC.COLECTIVO</a>
      <span style="font-family:'IBM Plex Mono',monospace;color:#4b5563;margin:0 10px;font-size:13px">·</span>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:0.1em">Dashboard</span>
    </div>
    <div class="nav-links">
      <span class="nav-user" id="nav-email"></span>
      <a href="#" onclick="Auth.signOut()">salir</a>
    </div>
  </nav>

  <div class="container page">
    <div id="page-body">
      <div class="empty-state">
        <div class="spinner" style="margin:0 auto"></div>
      </div>
    </div>
  </div>

  <style>
    /* Big org-card grid (default view) */
    .orgs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 10px;
      margin-top: 16px;
    }
    .org-card {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 20px;
      border: 1px solid #1f2937;
      text-decoration: none;
      color: inherit;
      transition: border-color 120ms, background 120ms;
      min-height: 140px;
      cursor: pointer;
    }
    .org-card:hover { border-color: #374151; background: #1a1a1a; }
    .org-card .logo-row { display: flex; align-items: center; gap: 12px; }
    .org-card .logo-row img {
      height: 40px;
      max-width: 140px;
      object-fit: contain;
      background: #ffffff;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .org-card .logo-row .placeholder {
      width: 32px; height: 32px;
      background: #1a1a1a;
      border: 1px solid #1f2937;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      color: #6b7280;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .org-card .name {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 18px;
      color: #ffffff;
      font-weight: 400;
      letter-spacing: -0.01em;
    }
    .org-card .meta {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: auto;
    }
    .org-card .type {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: #6b7280;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .org-card .count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: #9ca3af;
    }
    .org-card.add-card {
      border-style: dashed;
      align-items: center;
      justify-content: center;
      color: #6b7280;
    }
    .org-card.add-card:hover { color: #e5e7eb; border-color: #4b5563; }

    /* Filter view breadcrumb */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
    }
    .breadcrumb a {
      color: #6b7280;
      text-decoration: none;
      letter-spacing: 0.1em;
    }
    .breadcrumb a:hover { color: #e5e7eb; }
    .breadcrumb .sep { color: #374151; }
    .breadcrumb .current { color: #e5e7eb; letter-spacing: 0.05em; }
    .filter-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    .filter-header img { height: 36px; max-width: 140px; object-fit: contain; filter: invert(1); }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script>
    Auth.init(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
    API.init(CONFIG.API_URL);

    async function loadDashboard() {
      const session = await Auth.requireSession();
      document.getElementById('nav-email').textContent = session.user.email;

      try {
        const [orgs, eventsResp] = await Promise.all([
          API.get('/api/orgs').catch(() => []),
          API.get('/api/events'),
        ]);
        const { owned = [], staffed = [], viaOrg = [] } = eventsResp;

        // Group events by org; collect standalone
        const allMyEvents = [...owned, ...viaOrg];
        const eventsByOrgId = new Map(); // org_id -> events[]
        const standalone = [];
        for (const ev of allMyEvents) {
          if (ev.organization_id) {
            if (!eventsByOrgId.has(ev.organization_id)) eventsByOrgId.set(ev.organization_id, []);
            eventsByOrgId.get(ev.organization_id).push(ev);
          } else {
            standalone.push(ev);
          }
        }

        const params = new URLSearchParams(location.search);
        const filter = params.get('org'); // slug, __standalone, __staff, or null

        if (!filter) {
          renderOrgListView({ orgs, eventsByOrgId, standalone, staffed });
        } else {
          renderFilterView({ filter, orgs, eventsByOrgId, standalone, staffed });
        }
      } catch (err) {
        document.getElementById('page-body').innerHTML = `
          <div class="empty-state">
            <h3>Error al cargar eventos</h3>
            <p class="text-secondary">${esc(err.message)}</p>
          </div>`;
      }
    }

    function renderOrgListView({ orgs, eventsByOrgId, standalone, staffed }) {
      const orgCards = orgs.map(o => {
        const count = (eventsByOrgId.get(o.id) || []).length;
        return `
          <a href="/dashboard.html?org=${esc(o.slug)}" class="org-card">
            <div class="logo-row">
              ${o.logo_url ? `<img src="${esc(o.logo_url)}" alt="">` : `<div class="placeholder">${esc((o.name || '?')[0].toUpperCase())}</div>`}
            </div>
            <div class="name">${esc(o.name)}</div>
            <div class="meta">
              <span class="type">${o.type === 'venue' ? 'venue' : 'promotor'}</span>
              <span class="count">${count} ${count === 1 ? 'evento' : 'eventos'}</span>
            </div>
          </a>
        `;
      }).join('');

      const syntheticCards = [];
      if (standalone.length > 0) {
        syntheticCards.push(`
          <a href="/dashboard.html?org=__standalone" class="org-card">
            <div class="logo-row"><div class="placeholder">·</div></div>
            <div class="name">Independientes</div>
            <div class="meta"><span class="count">${standalone.length} ${standalone.length === 1 ? 'evento' : 'eventos'}</span></div>
          </a>
        `);
      }
      if (staffed.length > 0) {
        syntheticCards.push(`
          <a href="/dashboard.html?org=__staff" class="org-card">
            <div class="logo-row"><div class="placeholder">★</div></div>
            <div class="name">Como staff</div>
            <div class="meta"><span class="count">${staffed.length} ${staffed.length === 1 ? 'evento' : 'eventos'}</span></div>
          </a>
        `);
      }

      const html = `
        <div class="page-header">
          <h1 class="hero" style="font-size:28px;color:#ffffff">Mis organizaciones</h1>
          <a href="/org-editor.html" class="btn btn-sm hero" style="font-size:12px;">+ Nueva</a>
        </div>
        ${orgs.length === 0 && standalone.length === 0 && staffed.length === 0 ? `
          <div class="empty-state">
            <h3>Bienvenido</h3>
            <p class="text-secondary">Crea una organización para empezar.</p>
            <a href="/org-editor.html" class="btn btn-primary mt-24">+ Nueva organización</a>
          </div>
        ` : `
          <div class="orgs-grid">
            ${orgCards}
            ${syntheticCards.join('')}
          </div>
        `}
      `;
      document.getElementById('page-body').innerHTML = html;
    }

    function renderFilterView({ filter, orgs, eventsByOrgId, standalone, staffed }) {
      let title, subtitle, logoUrl, events, orgSlug = null, extraActions = '';

      if (filter === '__standalone') {
        title = 'Independientes';
        subtitle = 'Eventos sin organización';
        events = standalone;
      } else if (filter === '__staff') {
        title = 'Como staff';
        subtitle = 'Eventos de otras organizaciones donde colaboras';
        events = staffed;
      } else {
        const org = orgs.find(o => o.slug === filter);
        if (!org) {
          document.getElementById('page-body').innerHTML = `
            <div class="breadcrumb"><a href="/dashboard.html">← Organizaciones</a></div>
            <div class="empty-state"><h3>Organización no encontrada</h3></div>`;
          return;
        }
        title = org.name;
        subtitle = org.type === 'venue' ? 'Venue' : 'Promotor';
        logoUrl = org.logo_url;
        events = eventsByOrgId.get(org.id) || [];
        orgSlug = org.slug;
        extraActions = `
          <a href="/org-editor.html?slug=${esc(org.slug)}" class="btn hero">Editar organización</a>
          <a href="/${esc(org.slug)}" target="_blank" class="btn hero">Ver pública →</a>
        `;
      }

      const newEventHref = orgSlug
        ? `/event-editor.html?org=${esc(orgSlug)}`
        : `/event-editor.html`;

      const html = `
        <div class="breadcrumb">
          <a href="/dashboard.html">← Organizaciones</a>
          <span class="sep">/</span>
          <span class="current">${esc(title)}</span>
        </div>
        <div class="filter-header">
          ${logoUrl ? `<img src="${esc(logoUrl)}" alt="">` : ''}
          <div style="flex:1">
            <h1 class="hero" style="font-size:28px;color:#ffffff;margin:0;">${esc(title)}</h1>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:#6b7280;letter-spacing:0.18em;text-transform:uppercase;margin-top:4px;">${esc(subtitle)}</div>
          </div>
          <div style="display:flex;gap:8px;">
            ${extraActions}
            <a href="${newEventHref}" class="btn btn-primary hero">+ Nuevo evento</a>
          </div>
        </div>
        ${events.length === 0 ? `
          <div class="empty-state">
            <h3>Sin eventos aún</h3>
            <p class="text-secondary">Crea el primero para empezar.</p>
            <a href="${newEventHref}" class="btn btn-primary mt-24">+ Nuevo evento</a>
          </div>
        ` : `
          <div class="events-list">
            ${events.map(ev => renderEventCard(ev, filter === '__staff' ? ev.staff_role : null)).join('')}
          </div>
        `}
      `;
      document.getElementById('page-body').innerHTML = html;
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s == null ? '' : String(s);
      return d.innerHTML;
    }

    function renderEventCard(ev, staffRole) {
      const thumb = ev.banner_url
        ? `<img src="${ev.banner_url}" class="event-thumb" alt="">`
        : `<div class="event-thumb"></div>`;

      const badge = ev.published
        ? '<span class="badge badge-success">Publicado</span>'
        : '<span class="badge badge-muted">Borrador</span>';

      const roleLabel = staffRole
        ? `<span class="badge badge-warning" style="margin-left:8px">${staffRole}</span>`
        : '';

      const menu = !staffRole ? `
        <button class="event-menu-btn" onclick="event.preventDefault();event.stopPropagation();toggleMenu('${ev.slug}')">&#8942;</button>
        <div class="event-menu" id="menu-${ev.slug}">
          <a href="/event-editor.html?slug=${ev.slug}">Editar</a>
          <a href="/guestlist.html?slug=${ev.slug}">Guestlist</a>
          <a href="/scan.html?slug=${ev.slug}">Scanner</a>
          <button class="danger" onclick="event.preventDefault();deleteEvent('${ev.slug}', '${ev.name.replace(/'/g, "\\'")}')">Eliminar</button>
        </div>
      ` : '';

      return `
        <div class="event-card">
          <a href="/guestlist.html?slug=${ev.slug}" class="event-card-link">
            ${thumb}
            <div class="event-info">
              <div class="event-name hero">${ev.name}</div>
              <div class="event-meta">
                ${ev.date_label || ''}${ev.venue ? ' · ' + ev.venue : ''}
              </div>
              <div class="mt-8">${badge}${roleLabel}</div>
            </div>
          </a>
          ${menu}
        </div>`;
    }

    function toggleMenu(slug) {
      // Close all other menus
      document.querySelectorAll('.event-menu.open').forEach(m => {
        if (m.id !== 'menu-' + slug) m.classList.remove('open');
      });
      document.getElementById('menu-' + slug).classList.toggle('open');
    }

    // Close menus on outside click
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.event-menu-btn') && !e.target.closest('.event-menu')) {
        document.querySelectorAll('.event-menu.open').forEach(m => m.classList.remove('open'));
      }
    });

    async function deleteEvent(slug, name) {
      if (!confirm(`¿Eliminar "${name}"? Esta acción no se puede deshacer.`)) return;
      try {
        await API.del(`/api/events/${slug}`);
        await loadDashboard();
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    loadDashboard();
  </script>
</body>
</html>
