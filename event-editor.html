<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evento — Colectivo</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    .editor-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 24px;
      align-items: start;
    }
    .editor-sidebar {
      position: sticky;
      top: 24px;
    }
    .editor-section {
      margin-bottom: 32px;
    }
    .editor-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .banner-preview {
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: var(--radius);
      object-fit: cover;
      background: var(--bg-input);
      border: 1px solid var(--border);
      margin-bottom: 12px;
    }
    .sponsor-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .sponsor-item input { flex: 1; }
    .tier-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .tier-item input { flex: 1; }
    .tier-item button {
      padding: 6px 10px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 12px;
      cursor: pointer;
    }
    .tier-item button:hover { color: var(--danger); border-color: var(--danger); }
    #add-tier-btn {
      padding: 6px 12px;
      background: transparent;
      border: 1px dashed var(--border);
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: 12px;
      cursor: pointer;
      width: 100%;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #add-tier-btn:hover { border-color: var(--accent); color: var(--accent); }
    @media (max-width: 768px) {
      .editor-layout {
        grid-template-columns: 1fr;
      }
      .editor-sidebar {
        position: static;
      }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/dashboard.html" class="nav-brand">Colectivo</a>
    <div class="nav-links">
      <a href="/dashboard.html">← Eventos</a>
      <a href="#" onclick="Auth.signOut()">Salir</a>
    </div>
  </nav>

  <div class="container page">
    <div class="page-header">
      <h1 id="page-title">Nuevo evento</h1>
    </div>

    <div id="alert" class="hidden"></div>

    <div class="editor-layout">
      <div class="editor-main">

        <!-- Basic Info -->
        <div class="editor-section">
          <div class="editor-section-title">Información</div>
          <div class="form-group">
            <label class="form-label">Nombre del evento</label>
            <input type="text" class="form-input" id="name" placeholder="Nombre del evento" required>
          </div>
          <div class="form-group">
            <label class="form-label">URL (slug)</label>
            <input type="text" class="form-input" id="slug" placeholder="mi-evento">
            <div class="text-xs text-muted mt-8">colectivo.live/e/<span id="slug-preview">mi-evento</span></div>
          </div>
          <div class="form-group">
            <label class="form-label">Subtítulo</label>
            <input type="text" class="form-input" id="subtitle" placeholder="Una noche increíble">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Fecha</label>
              <input type="date" class="form-input" id="date_picker">
              <input type="hidden" id="date_label">
              <div class="text-xs text-muted mt-8" id="date-display"></div>
            </div>
            <div class="form-group">
              <label class="form-label">Hora</label>
              <input type="time" class="form-input" id="time_picker">
              <input type="hidden" id="time_label">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Venue</label>
              <input type="text" class="form-input" id="venue" placeholder="Nombre del lugar">
            </div>
            <div class="form-group">
              <label class="form-label">Ciudad</label>
              <input type="text" class="form-input" id="city" placeholder="Ciudad de México">
            </div>
          </div>
        </div>

        <!-- Description -->
        <div class="editor-section">
          <div class="editor-section-title">Descripción</div>
          <div class="form-group">
            <label class="form-label">Descripción</label>
            <textarea class="form-textarea" id="description" placeholder="Cuenta de qué va el evento..."></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Do's</label>
              <textarea class="form-textarea" id="dos" placeholder="Qué sí"></textarea>
            </div>
            <div class="form-group">
              <label class="form-label">Don'ts</label>
              <textarea class="form-textarea" id="donts" placeholder="Qué no"></textarea>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Restricciones</label>
            <textarea class="form-textarea" id="restrictions" placeholder="Edad mínima, etc."></textarea>
          </div>
        </div>

        <!-- Contact -->
        <div class="editor-section">
          <div class="editor-section-title">Contacto</div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" class="form-input" id="contact_email" placeholder="info@evento.com">
            </div>
            <div class="form-group">
              <label class="form-label">Teléfono</label>
              <input type="tel" class="form-input" id="contact_phone" placeholder="55 1234 5678">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Instagram</label>
            <input type="text" class="form-input" id="contact_instagram" placeholder="@usuario">
          </div>
        </div>

        <!-- Location -->
        <div class="editor-section">
          <div class="editor-section-title">Ubicación</div>
          <div class="form-group">
            <label class="form-label">Dirección</label>
            <input type="text" class="form-input" id="address" placeholder="Av. Insurgentes Sur 1971">
          </div>
          <div class="form-group">
            <label class="form-label">Google Maps URL</label>
            <input type="url" class="form-input" id="map_url" placeholder="https://maps.google.com/...">
          </div>
        </div>

        <!-- Ticket Types -->
        <div class="editor-section">
          <div class="editor-section-title">Tipos de acceso</div>
          <p class="text-xs text-secondary mb-16">Define las categorías de acceso para tu guestlist (ej. GA, VIP, Staff, Prensa)</p>
          <div id="tiers-container"></div>
          <button type="button" id="add-tier-btn" onclick="addTierRow()">+ Agregar tipo</button>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="editor-sidebar">
        <div class="card">
          <div class="form-group">
            <label class="form-label">Banner</label>
            <img id="banner-preview" class="banner-preview" src="" alt="" style="display:none">
            <input type="url" class="form-input" id="banner_url" placeholder="URL de la imagen">
          </div>
          <div class="form-group">
            <label class="form-label">Layout del venue</label>
            <input type="url" class="form-input" id="layout_url" placeholder="URL de la imagen">
          </div>

          <div style="margin-top:24px; display:flex; flex-direction:column; gap:8px;">
            <button class="btn btn-primary" onclick="saveEvent(true)" id="publish-btn">
              Publicar evento
            </button>
            <button class="btn" onclick="saveEvent(false)" id="draft-btn">
              Guardar borrador
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script>
    Auth.init(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
    API.init(CONFIG.API_URL);

    const params = new URLSearchParams(window.location.search);
    const editSlug = params.get('slug');
    let isEditing = false;

    const FIELDS = ['name', 'slug', 'subtitle', 'date_label', 'time_label', 'venue', 'city',
      'description', 'dos', 'donts', 'restrictions', 'contact_email', 'contact_phone',
      'contact_instagram', 'address', 'map_url', 'banner_url', 'layout_url'];

    // --- Tier management ---
    let tierCounter = 0;

    function addTierRow(label = '') {
      tierCounter++;
      const container = document.getElementById('tiers-container');
      const div = document.createElement('div');
      div.className = 'tier-item';
      div.id = `tier-row-${tierCounter}`;
      div.innerHTML = `
        <input type="text" class="form-input tier-label" placeholder="Nombre del tipo (ej. VIP)" value="${label}">
        <button type="button" onclick="removeTierRow(${tierCounter})">✕</button>
      `;
      container.appendChild(div);
    }

    function removeTierRow(id) {
      const row = document.getElementById(`tier-row-${id}`);
      if (row) row.remove();
    }

    function getTiers() {
      const labels = document.querySelectorAll('.tier-label');
      const tiers = [];
      labels.forEach((input, i) => {
        const label = input.value.trim();
        if (label) {
          tiers.push({ id: `tier-${i + 1}`, label });
        }
      });
      return tiers;
    }

    function loadTiers(tiers) {
      if (!tiers || !Array.isArray(tiers)) return;
      tiers.forEach(t => addTierRow(t.label));
    }

    // Date picker → formatted Spanish label
    function formatDateES(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      const date = new Date(y, m - 1, d);
      const days = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
      const months = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio',
        'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];
      return `${days[date.getDay()]} ${d} de ${months[date.getMonth()]} de ${y}`;
    }

    document.getElementById('date_picker').addEventListener('input', (e) => {
      if (e.target.value) {
        const formatted = formatDateES(e.target.value);
        document.getElementById('date_label').value = formatted;
        document.getElementById('date-display').textContent = formatted;
      }
    });

    document.getElementById('time_picker').addEventListener('input', (e) => {
      if (e.target.value) {
        document.getElementById('time_label').value = e.target.value + ' hrs';
      }
    });

    // Auto-generate slug from name
    document.getElementById('name').addEventListener('input', (e) => {
      if (!isEditing) {
        const slug = e.target.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
        document.getElementById('slug').value = slug;
        document.getElementById('slug-preview').textContent = slug || 'mi-evento';
      }
    });

    document.getElementById('slug').addEventListener('input', (e) => {
      document.getElementById('slug-preview').textContent = e.target.value || 'mi-evento';
    });

    document.getElementById('banner_url').addEventListener('input', (e) => {
      const img = document.getElementById('banner-preview');
      if (e.target.value) {
        img.src = e.target.value;
        img.style.display = 'block';
      } else {
        img.style.display = 'none';
      }
    });

    function showAlert(msg, type = 'error') {
      const el = document.getElementById('alert');
      el.className = `alert alert-${type}`;
      el.innerHTML = msg;
      el.style.cssText = `padding:12px 16px;border-radius:8px;font-size:14px;margin-bottom:16px;background:${type === 'error' ? 'rgba(239,68,68,0.1)' : 'rgba(34,197,94,0.1)'};color:${type === 'error' ? 'var(--danger)' : 'var(--success)'};border:1px solid ${type === 'error' ? 'rgba(239,68,68,0.2)' : 'rgba(34,197,94,0.2)'}`;
    }

    async function loadEvent() {
      await Auth.requireSession();

      if (!editSlug) return;

      isEditing = true;
      document.getElementById('page-title').textContent = 'Editar evento';

      try {
        const event = await API.get(`/api/events/${editSlug}`);

        for (const field of FIELDS) {
          const el = document.getElementById(field);
          if (el && event[field]) el.value = event[field];
        }

        document.getElementById('slug-preview').textContent = event.slug;

        // Populate tiers
        loadTiers(event.tiers);

        // Populate date/time pickers from stored labels
        if (event.date_label) {
          document.getElementById('date-display').textContent = event.date_label;
          document.getElementById('date_label').value = event.date_label;
        }
        if (event.time_label) {
          const timeVal = event.time_label.replace(' hrs', '');
          document.getElementById('time_picker').value = timeVal;
          document.getElementById('time_label').value = event.time_label;
        }

        if (event.banner_url) {
          const img = document.getElementById('banner-preview');
          img.src = event.banner_url;
          img.style.display = 'block';
        }

        if (event.published) {
          document.getElementById('publish-btn').textContent = 'Actualizar';
        }
      } catch (err) {
        showAlert('Error al cargar evento: ' + err.message);
      }
    }

    async function saveEvent(publish) {
      const btn = publish
        ? document.getElementById('publish-btn')
        : document.getElementById('draft-btn');

      const name = document.getElementById('name').value.trim();
      if (!name) {
        showAlert('El nombre del evento es obligatorio');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Guardando...';

      const body = { published: publish, tiers: getTiers() };
      for (const field of FIELDS) {
        const el = document.getElementById(field);
        if (el) body[field] = el.value.trim() || null;
      }

      try {
        if (isEditing) {
          await API.put(`/api/events/${editSlug}`, body);
          showAlert('Evento actualizado', 'success');
        } else {
          const created = await API.post('/api/events', body);
          showAlert('Evento creado', 'success');
          // Redirect to guestlist
          setTimeout(() => {
            window.location.href = `/guestlist.html?slug=${created.slug}`;
          }, 1000);
        }
      } catch (err) {
        showAlert(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = publish
          ? (isEditing ? 'Actualizar' : 'Publicar evento')
          : 'Guardar borrador';
      }
    }

    loadEvent();
  </script>
</body>
</html>
