<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guestlist — Colectivo</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .guest-actions {
      display: flex;
      gap: 4px;
    }
    .guest-actions button {
      padding: 4px 8px;
      font-size: 12px;
    }
    .bulk-area {
      margin-top: 16px;
    }
    .bulk-area textarea {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      min-height: 120px;
    }
    .tab-bar {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .tab-btn {
      flex: 1;
      padding: 8px 16px;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: all var(--transition);
    }
    .tab-btn.active {
      background: var(--bg-input);
      color: var(--text);
    }
    .event-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .event-header h1 { flex: 1; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/dashboard.html" class="nav-brand">Colectivo</a>
    <div class="nav-links">
      <a href="/dashboard.html">← Eventos</a>
      <a href="#" id="scan-link" class="hidden">Scanner</a>
      <a href="#" id="edit-link" class="hidden">Editar</a>
      <a href="#" onclick="Auth.signOut()">Salir</a>
    </div>
  </nav>

  <div class="container page">
    <!-- Event header -->
    <div class="event-header">
      <div>
        <h1 id="event-name">Cargando...</h1>
        <span class="text-sm text-secondary" id="event-meta"></span>
      </div>
      <div id="event-badge"></div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="stat-total">—</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-checked">—</div>
        <div class="stat-label">Registrados</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-pending">—</div>
        <div class="stat-label">Pendientes</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-emails">—</div>
        <div class="stat-label">QR enviados</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="flex justify-between items-center mb-16" style="flex-wrap:wrap; gap:8px;">
      <div class="toolbar">
        <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ Agregar</button>
        <button class="btn btn-sm" onclick="openBulkModal()">Agregar múltiples</button>
        <button class="btn btn-sm" onclick="sendAllQr()" id="send-all-btn">📧 Enviar QR a todos</button>
      </div>
      <div class="search-bar" style="margin:0; max-width:280px; flex:1;">
        <input type="text" placeholder="Buscar..." id="search-input" oninput="handleSearch()">
      </div>
    </div>

    <!-- Guest table -->
    <div class="card" style="padding:0; overflow:hidden;">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Email</th>
              <th>Notas</th>
              <th>QR</th>
              <th>Estado</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="guests-table">
            <tr><td colspan="6" class="text-secondary" style="text-align:center;padding:32px;">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Add Guest Modal -->
  <div class="modal-overlay" id="add-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Agregar invitado</h2>
        <button class="modal-close" onclick="closeModal('add-modal')">&times;</button>
      </div>
      <form onsubmit="addGuest(event)">
        <div class="form-group">
          <label class="form-label">Nombre</label>
          <input type="text" class="form-input" id="add-name" required placeholder="Nombre completo">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="add-email" placeholder="email@ejemplo.com">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Teléfono</label>
            <input type="tel" class="form-input" id="add-phone" placeholder="55 1234 5678">
          </div>
          <div class="form-group">
            <label class="form-label">Notas</label>
            <input type="text" class="form-input" id="add-notes" placeholder="VIP, +1, etc.">
          </div>
        </div>
        <label style="display:flex;align-items:center;gap:8px;margin-bottom:16px;cursor:pointer;">
          <input type="checkbox" id="add-send-email" checked>
          <span class="text-sm">Enviar QR por email</span>
        </label>
        <button type="submit" class="btn btn-primary" style="width:100%" id="add-btn">Agregar</button>
      </form>
    </div>
  </div>

  <!-- Bulk Add Modal -->
  <div class="modal-overlay" id="bulk-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Agregar múltiples</h2>
        <button class="modal-close" onclick="closeModal('bulk-modal')">&times;</button>
      </div>
      <p class="text-sm text-secondary mb-16">Un invitado por línea. Formato: <code>Nombre, email, notas</code></p>
      <div class="form-group">
        <textarea class="form-textarea" id="bulk-text" placeholder="Juan Pérez, juan@email.com, VIP
María López, maria@email.com
Carlos García" style="min-height:160px;font-family:'SF Mono',monospace;font-size:13px;"></textarea>
      </div>
      <label style="display:flex;align-items:center;gap:8px;margin-bottom:16px;cursor:pointer;">
        <input type="checkbox" id="bulk-send-email">
        <span class="text-sm">Enviar QR por email a todos</span>
      </label>
      <button class="btn btn-primary" style="width:100%" onclick="bulkAdd()" id="bulk-btn">Agregar todos</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script>
    Auth.init(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
    API.init(CONFIG.API_URL);

    const slug = new URLSearchParams(window.location.search).get('slug');
    if (!slug) window.location.href = '/dashboard.html';

    let allGuests = [];

    async function init() {
      await Auth.requireSession();
      await loadEvent();
      await loadGuests();
    }

    async function loadEvent() {
      try {
        const event = await API.get(`/api/events/${slug}`);
        document.getElementById('event-name').textContent = event.name;
        document.getElementById('event-meta').textContent =
          [event.date_label, event.venue, event.city].filter(Boolean).join(' · ');
        document.getElementById('event-badge').innerHTML = event.published
          ? '<span class="badge badge-success">Publicado</span>'
          : '<span class="badge badge-muted">Borrador</span>';

        // Nav links
        const scanLink = document.getElementById('scan-link');
        scanLink.href = `/scan.html?slug=${slug}`;
        scanLink.classList.remove('hidden');

        if (event.user_role === 'owner') {
          const editLink = document.getElementById('edit-link');
          editLink.href = `/event-editor.html?slug=${slug}`;
          editLink.classList.remove('hidden');
        }
      } catch (err) {
        document.getElementById('event-name').textContent = 'Error';
      }
    }

    async function loadGuests() {
      try {
        const { guests, stats } = await API.get(`/api/events/${slug}/guests`);
        allGuests = guests;

        document.getElementById('stat-total').textContent = stats.total;
        document.getElementById('stat-checked').textContent = stats.checked_in;
        document.getElementById('stat-pending').textContent = stats.total - stats.checked_in;
        document.getElementById('stat-emails').textContent = stats.emails_sent;

        renderTable(guests);
      } catch (err) {
        document.getElementById('guests-table').innerHTML =
          `<tr><td colspan="6" style="text-align:center;padding:32px;" class="text-secondary">${err.message}</td></tr>`;
      }
    }

    function renderTable(guests) {
      const tbody = document.getElementById('guests-table');

      if (guests.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-secondary" style="text-align:center;padding:32px;">No hay invitados aún</td></tr>';
        return;
      }

      tbody.innerHTML = guests.map(g => `
        <tr>
          <td><strong>${esc(g.name)}</strong></td>
          <td class="text-sm text-secondary">${esc(g.email || '—')}</td>
          <td class="text-sm text-secondary">${esc(g.notes || '')}</td>
          <td>${g.email_sent ? '<span class="badge badge-success">Enviado</span>' : g.email ? '<span class="badge badge-muted">Pendiente</span>' : '<span class="text-muted text-xs">Sin email</span>'}</td>
          <td>${g.checked_in ? '<span class="badge badge-success">✓ Dentro</span>' : '<span class="badge badge-muted">Pendiente</span>'}</td>
          <td>
            <div class="guest-actions">
              ${g.email && !g.email_sent ? `<button class="btn btn-sm" onclick="sendQr('${g.id}', this)">Enviar QR</button>` : ''}
              ${g.email && g.email_sent ? `<button class="btn btn-sm" onclick="sendQr('${g.id}', this)">Reenviar</button>` : ''}
              <button class="btn btn-danger btn-sm" onclick="removeGuest('${g.id}')">✕</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function handleSearch() {
      const q = document.getElementById('search-input').value.toLowerCase();
      const filtered = allGuests.filter(g =>
        g.name.toLowerCase().includes(q) ||
        (g.email && g.email.toLowerCase().includes(q)) ||
        (g.notes && g.notes.toLowerCase().includes(q))
      );
      renderTable(filtered);
    }

    function openAddModal() {
      document.getElementById('add-modal').classList.add('active');
      document.getElementById('add-name').focus();
    }

    function openBulkModal() {
      document.getElementById('bulk-modal').classList.add('active');
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('active');
    }

    async function addGuest(e) {
      e.preventDefault();
      const btn = document.getElementById('add-btn');
      btn.disabled = true;
      btn.textContent = 'Agregando...';

      try {
        await API.post(`/api/events/${slug}/guests`, {
          name: document.getElementById('add-name').value.trim(),
          email: document.getElementById('add-email').value.trim() || null,
          phone: document.getElementById('add-phone').value.trim() || null,
          notes: document.getElementById('add-notes').value.trim() || null,
          send_email: document.getElementById('add-send-email').checked,
        });

        // Reset form
        document.getElementById('add-name').value = '';
        document.getElementById('add-email').value = '';
        document.getElementById('add-phone').value = '';
        document.getElementById('add-notes').value = '';

        closeModal('add-modal');
        await loadGuests();
      } catch (err) {
        alert(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Agregar';
      }
    }

    async function bulkAdd() {
      const btn = document.getElementById('bulk-btn');
      const text = document.getElementById('bulk-text').value.trim();
      if (!text) return;

      const lines = text.split('\n').filter(l => l.trim());
      const guests = lines.map(line => {
        const parts = line.split(',').map(p => p.trim());
        return {
          name: parts[0],
          email: parts[1] || null,
          notes: parts[2] || null,
        };
      });

      btn.disabled = true;
      btn.textContent = `Agregando ${guests.length}...`;

      try {
        const result = await API.post(`/api/events/${slug}/guests/bulk`, {
          guests,
          send_emails: document.getElementById('bulk-send-email').checked,
        });

        document.getElementById('bulk-text').value = '';
        closeModal('bulk-modal');
        await loadGuests();
        alert(`${result.added} invitados agregados, ${result.emails_sent} emails enviados`);
      } catch (err) {
        alert(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Agregar todos';
      }
    }

    async function sendQr(guestId, btn) {
      if (btn) { btn.disabled = true; btn.textContent = '...'; }
      try {
        await API.post(`/api/events/${slug}/guests/${guestId}/send-qr`);
        await loadGuests();
      } catch (err) {
        alert(err.message);
      } finally {
        if (btn) { btn.disabled = false; }
      }
    }

    async function sendAllQr() {
      const btn = document.getElementById('send-all-btn');
      btn.disabled = true;
      btn.textContent = 'Enviando...';
      try {
        const result = await API.post(`/api/events/${slug}/guests/send-all`);
        await loadGuests();
        alert(`${result.sent} emails enviados`);
      } catch (err) {
        alert(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '📧 Enviar QR a todos';
      }
    }

    async function removeGuest(guestId) {
      if (!confirm('¿Eliminar este invitado?')) return;
      try {
        await API.del(`/api/events/${slug}/guests/${guestId}`);
        await loadGuests();
      } catch (err) {
        alert(err.message);
      }
    }

    // Close modal on overlay click
    document.querySelectorAll('.modal-overlay').forEach(overlay => {
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) overlay.classList.remove('active');
      });
    });

    init();
  </script>
</body>
</html>
